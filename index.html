<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书养生赛道选题看板</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #FF2442;
      --red-light: #FFF0F2;
      --orange: #FF8C00;
      --purple: #9B59B6;
      --bg: #F5F5F7;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #555;
      --text-muted: #999;
      --border: #EBEBEB;
      --shadow: 0 2px 12px rgba(0,0,0,.07);
      --shadow-hover: 0 8px 28px rgba(0,0,0,.13);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ───── 顶部栏 ───── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .logo-tag {
      background: var(--red-light);
      color: var(--red);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .topbar-meta {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #52C41A; margin-right: 5px; vertical-align: middle; }

    /* ───── 工具栏 ───── */
    .toolbar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .search-input {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px 7px 34px;
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color .2s;
      background: var(--bg);
    }
    .search-input:focus { border-color: var(--red); }
    .sort-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .sort-label { font-size: 13px; color: var(--text-muted); }
    .sort-btn {
      padding: 6px 13px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all .18s;
      white-space: nowrap;
    }
    .sort-btn:hover { border-color: var(--red); color: var(--red); }
    .sort-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
    .sort-btn.active-date { background: #1A1A1A; color: #fff; border-color: #1A1A1A; }

    /* ───── 统计概览 ───── */
    .stats-row {
      padding: 16px 24px 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border: 1px solid var(--border);
      min-width: 120px;
    }
    .stat-chip .s-label { font-size: 11px; color: var(--text-muted); }
    .stat-chip .s-val { font-size: 20px; font-weight: 700; color: var(--text-primary); }

    /* ───── 卡片网格 ───── */
    .grid {
      padding: 16px 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    /* 封面 */
    .card-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #fce4ec, #f3e5f5);
      display: block;
    }
    .card-cover-ph {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #FFF0F2, #f3e5f5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    /* 正文 */
    .card-body { padding: 14px 14px 12px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .card-tag {
      background: var(--red-light);
      color: var(--red);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 数据指标 */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .metric {
      background: var(--bg);
      border-radius: 8px;
      padding: 7px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .metric .m-icon { font-size: 14px; }
    .metric .m-val { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .metric .m-lbl { font-size: 10px; color: var(--text-muted); }
    .metric.m-likes .m-val { color: var(--red); }
    .metric.m-saves .m-val { color: var(--orange); }
    .metric.m-comments .m-val { color: var(--purple); }

    .metrics-row2 {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .metrics-row2 span { display: flex; align-items: center; gap: 3px; }

    .pub-date { font-size: 11px; color: var(--text-muted); }

    /* 分隔线 */
    .card-divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

    /* 博主信息 */
    .blogger {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      padding-top: 2px;
    }
    .blogger-ava {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .blogger-ava-ph {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #FF6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .blogger-info { flex: 1; min-width: 0; }
    .blogger-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .blogger-fans { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .blogger-bio {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state .e-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; display: block; margin-top: 6px; }

    /* 排行徽章 */
    .rank-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }
    .rank-1 { background: #FFD700; color: #333; }
    .rank-2 { background: #C0C0C0; color: #333; }
    .rank-3 { background: #CD7F32; }
    .rank-other { background: rgba(0,0,0,.35); }
    .cover-wrap { position: relative; }

    @media (max-width: 640px) {
      .topbar { padding: 0 14px; }
      .toolbar { padding: 8px 14px; }
      .sort-group { margin-left: 0; }
      .grid { padding: 12px 14px 24px; grid-template-columns: 1fr; }
      .stats-row { padding: 12px 14px 0; }
    }
  </style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <span class="logo-text">养生赛道选题看板</span>
    <span class="logo-tag">小红书</span>
  </div>
  <span class="topbar-meta">
    <span class="dot"></span>共 <b id="total-count">0</b> 条笔记&nbsp;&nbsp;更新于 <span id="update-time">—</span>
  </span>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="search-input" type="text" placeholder="搜索笔记标题或博主…" oninput="renderCards()">
  </div>
  <div class="sort-group">
    <span class="sort-label">排序：</span>
    <button class="sort-btn active" data-sort="likes" onclick="setSort(this)">❤️ 点赞</button>
    <button class="sort-btn" data-sort="saves" onclick="setSort(this)">⭐ 收藏</button>
    <button class="sort-btn" data-sort="comments" onclick="setSort(this)">💬 评论</button>
    <button class="sort-btn" data-sort="reads" onclick="setSort(this)">👁 阅读</button>
    <button class="sort-btn" data-sort="shares" onclick="setSort(this)">🔗 分享</button>
    <button class="sort-btn" data-sort="date" onclick="setSort(this)">📅 时间</button>
  </div>
  <div class="sort-group" style="margin-left:0; border-left: 1px solid var(--border); padding-left: 10px;">
    <span class="sort-label">时间：</span>
    <button class="sort-btn" data-days="0" onclick="setDateFilter(this)">全部</button>
    <button class="sort-btn active-date" data-days="180" onclick="setDateFilter(this)">近6个月</button>
    <button class="sort-btn" data-days="90" onclick="setDateFilter(this)">近3个月</button>
    <button class="sort-btn" data-days="30" onclick="setDateFilter(this)">近1个月</button>
  </div>
</div>

<!-- 统计概览 -->
<div class="stats-row" id="stats-row"></div>

<!-- 卡片网格 -->
<div class="grid" id="card-grid"></div>

<script>
  let allData = [];
  let currentSort = 'likes';
  let currentDays = 180; // 默认近6个月

  // ── 数字格式化
  function fmt(n) {
    if (n == null || n === '') return '—';
    n = Number(n);
    if (isNaN(n)) return '—';
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return n.toLocaleString('zh-CN');
  }

  // ── 切换排序
  function setSort(btn) {
    currentSort = btn.dataset.sort;
    document.querySelectorAll('.sort-btn:not([data-days])').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  // ── 切换时间筛选
  function setDateFilter(btn) {
    currentDays = Number(btn.dataset.days);
    document.querySelectorAll('.sort-btn[data-days]').forEach(b => b.classList.remove('active-date'));
    btn.classList.add('active-date');
    renderCards();
  }

  // ── 渲染统计条
  function renderStats(data) {
    const sum = (key) => data.reduce((s, d) => s + (Number(d[key]) || 0), 0);
    const avg = (key) => data.length ? Math.round(sum(key) / data.length) : 0;
    document.getElementById('stats-row').innerHTML = [
      ['笔记数量', data.length],
      ['总点赞数', fmt(sum('likes'))],
      ['总收藏数', fmt(sum('saves'))],
      ['总评论数', fmt(sum('comments'))],
      ['平均点赞', fmt(avg('likes'))],
      ['平均收藏', fmt(avg('saves'))],
    ].map(([l, v]) => `
      <div class="stat-chip">
        <div class="s-label">${l}</div>
        <div class="s-val">${v}</div>
      </div>`).join('');
  }

  // ── 渲染卡片
  function renderCards() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const cutoff = currentDays > 0
      ? new Date(Date.now() - currentDays * 864e5)
      : null;

    let data = allData.filter(d => {
      if (q && !(d.title || '').toLowerCase().includes(q) && !(d.blogger_name || '').toLowerCase().includes(q)) return false;
      if (cutoff && d.publish_date) {
        const pub = new Date(d.publish_date);
        if (!isNaN(pub) && pub < cutoff) return false;
      }
      return true;
    });

    data.sort((a, b) => {
      if (currentSort === 'date') return new Date(b.publish_date || 0) - new Date(a.publish_date || 0);
      return (Number(b[currentSort]) || 0) - (Number(a[currentSort]) || 0);
    });

    const grid = document.getElementById('card-grid');
    if (!data.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="e-icon">🌿</div>
          <p>${q ? '没有找到匹配的笔记' : '暂无数据'}</p>
          <small>${q ? '换个关键词试试' : '请先运行爬虫脚本，或检查 data.json 是否存在'}</small>
        </div>`;
      return;
    }

    grid.innerHTML = data.map((d, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const rankLabel = rank <= 3 ? ['🥇','🥈','🥉'][rank - 1] : rank;

      const coverHtml = d.cover_image
        ? `<img class="card-cover" src="${esc(d.cover_image)}" alt="封面" loading="lazy"
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'card-cover-ph',textContent:'🌿'}))">`
        : `<div class="card-cover-ph">🌿</div>`;

      const avaHtml = d.blogger_avatar
        ? `<img class="blogger-ava" src="${esc(d.blogger_avatar)}" alt="${esc(d.blogger_name)}"
             onerror="this.replaceWith(makePh('${(d.blogger_name||'?')[0]}'))">`
        : `<div class="blogger-ava-ph">${(d.blogger_name || '?')[0]}</div>`;

      const tags = (d.tags || '').split(',').map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="card-tag">${esc(t)}</span>`).join('');

      return `
        <div class="card">
          <div class="cover-wrap">
            ${coverHtml}
            <div class="rank-badge ${rankClass}">${rankLabel}</div>
          </div>
          <div class="card-body">
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
            <div class="card-title">${esc(d.title || '无标题')}</div>

            <div class="metrics">
              <div class="metric m-likes">
                <span class="m-icon">❤️</span>
                <span class="m-val">${fmt(d.likes)}</span>
                <span class="m-lbl">点赞</span>
              </div>
              <div class="metric m-saves">
                <span class="m-icon">⭐</span>
                <span class="m-val">${fmt(d.saves)}</span>
                <span class="m-lbl">收藏</span>
              </div>
              <div class="metric m-comments">
                <span class="m-icon">💬</span>
                <span class="m-val">${fmt(d.comments)}</span>
                <span class="m-lbl">评论</span>
              </div>
            </div>

            <div class="metrics-row2">
              <span>👁 阅读&nbsp;<b>${fmt(d.reads)}</b></span>
              <span>🔗 分享&nbsp;<b>${fmt(d.shares)}</b></span>
              <span class="pub-date" style="margin-left:auto">📅 ${d.publish_date || '—'}</span>
            </div>

            <hr class="card-divider">

            <div class="blogger">
              ${avaHtml}
              <div class="blogger-info">
                <div class="blogger-name">${esc(d.blogger_name || '未知博主')}</div>
                <div class="blogger-fans">粉丝 ${fmt(d.followers)}</div>
                <div class="blogger-bio" title="${esc(d.blogger_bio || '')}">${esc(d.blogger_bio || '')}</div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function makePh(ch) {
    const d = document.createElement('div');
    d.className = 'blogger-ava-ph';
    d.textContent = ch;
    return d;
  }

  // ── 加载数据
  async function loadData() {
    try {
      const r = await fetch('data.json');
      if (!r.ok) throw new Error('not found');
      const json = await r.json();
      allData = json.notes || [];
      document.getElementById('total-count').textContent = allData.length;
      document.getElementById('update-time').textContent = json.updated_at || '—';
    } catch {
      allData = sampleData();
      document.getElementById('total-count').textContent = allData.length;
      document.getElementById('update-time').textContent = '示例数据';
    }
    renderStats(allData);
    renderCards();
  }

      { title:"中医说：这4种体质最容易胖！找准体质才能真正瘦下来", cover_image:"https://picsum.photos/seed/body29/400/300", reads:445000, likes:99200, saves:121000, comments:8300, shares:6100, publish_date:"2026-02-03", tags:"体质,减肥", blogger_name:"体质养生研究所", blogger_avatar:"https://picsum.photos/seed/av29/80/80", blogger_bio:"中医体质辨识专家｜个性化养生", followers:567000 },
      { title:"月经不调的根本原因！中医妇科医生解答，附调理方案", cover_image:"https://picsum.photos/seed/women14/400/300", reads:423000, likes:94500, saves:118000, comments:8900, shares:6700, publish_date:"2026-02-19", tags:"月经,女性健康", blogger_name:"妇科养生堂", blogger_avatar:"https://picsum.photos/seed/av14/80/80", blogger_bio:"执业妇科医生｜女性健康科普", followers:612000 },
      { title:"掉发严重？先看看你缺什么！中医视角分析4种掉发类型", cover_image:"https://picsum.photos/seed/hair17/400/300", reads:412000, likes:91300, saves:108000, comments:7800, shares:5900, publish_date:"2026-01-28", tags:"掉发,头发养护", blogger_name:"养发护发研究所", blogger_avatar:"https://picsum.photos/seed/av17/80/80", blogger_bio:"专注头发健康5年｜天然养发秘方", followers:445000 },
